<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Demo Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('https://picsum.photos/1600/900');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 3em;
        }

        p {
            text-align: center;
            font-size: 1.2em;
        }

        .image-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .image-section img {
            width: 250px;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .image-section img:hover {
            transform: scale(1.1);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>Welcome to My Demo Page</h1>
        <p>This is a simple HTML page with a background image, text, and pictures.</p>

        <div class="image-section">
            <img src="https://in.pinterest.com/pin/276971445833179164/" >
            <img src="https://in.pinterest.com/pin/8796161770458783/">
            <img src="https://in.pinterest.com/pin/63402307250474165/" >
        </div>

        <div class="footer">
            <p>Made for cloud testing 🚀</p>
        </div>
    </div>
</body>
</html>
